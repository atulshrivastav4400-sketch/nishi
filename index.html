<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#ff4f8b;

    font-family:Segoe UI, sans-serif;

    overflow:hidden;
}

.card{

    width:90%;

    max-width:600px;

    padding:70px 60px;

    border-radius:40px;

    text-align:center;

    background:rgba(255,255,255,0.15);

    border:1px solid rgba(255,255,255,0.25);

    backdrop-filter:blur(20px);

    box-shadow:
    0 25px 60px rgba(0,0,0,0.12);
}

input{

    width:100%;

    height:68px;

    border:none;

    outline:none;

    border-radius:20px;

    text-align:center;

    font-size:20px;

    background:white;

    color:#666;
}

input::placeholder{

    color:#999;
}

button{

    width:100%;

    height:68px;

    margin-top:18px;

    border:none;

    border-radius:20px;

    background:white;

    color:#ff4f8b;

    font-size:20px;

    font-weight:600;

    cursor:pointer;
}

.hint{

    margin-top:22px;

    color:white;

    font-size:16px;
}

</style>

</head>

<body>

<div class="card">

```
<input
    id="pass"
    type="password"
    placeholder="Password"
>

<button onclick="unlock()">
    Enter
</button>

<div class="hint">
    Hint: Back Side of The Note
</div>
```

</div>

<script>

function unlock(){

    const password =
    document.getElementById("pass")
    .value
    .trim()
    .toLowerCase();

    if(password === "nishi"){

        window.location.href = "page2.html";

    }

}

</script>

</body>

</html>
