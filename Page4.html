<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reason For Making This</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#fff5f8;

    overflow:hidden;
}

.container{

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    width:min(92vw,900px);

    padding:40px;

    animation:fadeIn 2s ease;
}

.heading{

    font-family:Baskerville, "Baskerville Old Face", Garamond, serif;

    font-size:3rem;

    font-weight:400;

    color:#1f4e79;

    margin-bottom:35px;
}

.message{

    font-family:Segoe UI, sans-serif;

    font-size:1.35rem;

    line-height:1.9;

    color:#1f4e79;

    max-width:700px;

    margin-bottom:45px;
}

.next{

    padding:14px 36px;

    border:none;

    border-radius:18px;

    background:#ff4f8b;

    color:white;

    font-size:1rem;

    font-weight:600;

    cursor:pointer;
}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(25px);
    }

    to{

        opacity:1;

        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="container">

```
<div class="heading">
    Reason For Making This
</div>

<div class="message">

    I felt this would be a more comfortable way for you to know me first and then decide for yourself.

    <br><br>

    I also felt this would be safer for you than simply exchanging a phone number or other contact details.

</div>

<button
    class="next"
    onclick="window.location.href='page5.html'">
    Continue
</button>
```

</div>

</body>

</html>
