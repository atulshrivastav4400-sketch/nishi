<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff5f8;
    padding:30px;
}

.container{
    text-align:center;
    max-width:800px;
}

.cat-image{
    width:100%;
    max-width:500px;
    border-radius:20px;
    margin-bottom:35px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.message{
    font-family:Baskerville, "Baskerville Old Face", Garamond, serif;
    font-size:2rem;
    line-height:1.8;
    color:#1f4e79;
    margin-bottom:40px;
}

.contact{
    font-family:"Segoe UI", sans-serif;
    font-size:1.15rem;
    color:#ff4f8b;
    line-height:2;
    font-weight:600;
}

.label{
    color:#1f4e79;
    font-weight:700;
}

@media (max-width:768px){

    .message{
        font-size:1.4rem;
    }

    .contact{
        font-size:1rem;
    }

    .cat-image{
        max-width:100%;
    }
}

</style>

</head>

<body>

<div class="container">

    <img
        src="roadcat.png"
        alt="Road Cat"
        class="cat-image"
    >

    <div class="message">

        I respect whatever you decide.

        <br><br>

        If you'd like to talk, you can message me here.

    </div>

    <div class="contact">

        <span class="label">Instagram:</span>
        @atulshrivastav4400

        <br><br>

        <span class="label">Gmail:</span>
        atulshrivastav4400@gmail.com

    </div>

</div>

</body>
</html>
