<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#fff5f8;

    padding:30px;
}

.container{

    display:flex;

    flex-direction:column;

    align-items:center;

    text-align:center;
}

.cat{

    width:420px;

    max-width:90vw;

    border-radius:24px;

    box-shadow:
    0 20px 40px rgba(0,0,0,0.15);

    margin-bottom:35px;
}

.next{

    padding:14px 36px;

    border:none;

    border-radius:18px;

    background:#ff4f8b;

    color:white;

    font-size:1rem;

    font-weight:600;

    cursor:pointer;

    transition:0.25s;
}

.next:hover{

    transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="container">

```
<img
    src="Cat.png"
    alt="Cat"
    class="cat"
>

<button
    class="next"
    onclick="window.location.href='page7.html'">
    Continue
</button>
```

</div>

</body>

</html>
