<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atul Shrivastav</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#fff5f8;

    overflow:hidden;
}

.container{

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    width:min(92vw,900px);

    padding:40px;

    animation:fadeIn 2s ease;
}

.name{

    font-family:Baskerville, "Baskerville Old Face", Garamond, serif;

    font-size:4.8rem;

    font-weight:400;

    color:#1f4e79;
}

.next{

    margin-top:40px;

    padding:14px 36px;

    border:none;

    border-radius:18px;

    background:#ff4f8b;

    color:white;

    font-size:1rem;

    font-weight:600;

    cursor:pointer;
}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(25px);
    }

    to{

        opacity:1;

        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="container">

<div class="name">
    I am Atul Shrivastav
</div>

<button
    class="next"
    onclick="window.location.href='page4.html'">
