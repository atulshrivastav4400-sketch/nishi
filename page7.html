<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Small Invitation</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#fff5f8;

    padding:30px;
}

.container{

    text-align:center;

    max-width:800px;
}

.message{

    font-family:Baskerville, "Baskerville Old Face", Garamond, serif;

    font-size:2rem;

    line-height:1.8;

    color:#1f4e79;

    margin-bottom:50px;
}

.next{

    padding:14px 36px;

    border:none;

    border-radius:18px;

    background:#ff4f8b;

    color:white;

    font-size:1rem;

    font-weight:600;

    cursor:pointer;
}

.next:hover{

    opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

```
<div class="message">

    I'm planning to watch Cocktail 2 soon.

    <br><br>

    Would you like to join me?

</div>

<button
    class="next"
    onclick="window.location.href='page8.html'">
    Continue
</button>
```

</div>

</body>

</html>
